data_collection:
  provider: "alchemy"
  batch_size: 1000
  rate_limit_per_sec: 25

graph:
  node_feature_dim: 11
  edge_feature_dim: 30
  time2vec_dim: 16

  windows:
    short:
      size: 100       # ~20 min on Ethereum
      stride: 50
    medium:
      size: 1000      # ~3.3 hours
      stride: 200
    long:
      size: 10000     # ~33 hours
      stride: 2000

clustering:
  gas_funding:
    max_hops: 2
    time_window_blocks: 100
  temporal_cooccurrence:
    block_threshold: 10
    min_cooccurrences: 3

model:
  embedding_dim: 64
  num_heads: 4
  num_layers: 2
  dropout: 0.3
  memory_dim: 64

training:
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.00001
  epochs: 100
  patience: 10
  focal_loss_gamma: 2.0
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  negative_ratio: 10

evaluation:
  metrics:
    - precision
    - recall
    - f1
    - auc_roc
